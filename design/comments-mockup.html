<!doctype html>
<html lang="de"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Alpes – Foto-Kommentare · Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.11.0/tabler-icons.min.css"/>
<style>
  body{margin:0;min-height:100vh;background:#08070a;color:#F2F1F5;font-family:'Space Grotesk',sans-serif;display:flex;flex-direction:column;align-items:center;gap:18px;padding:32px 16px}
  .cap{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;color:#55545e}
  .cb{font-family:'Inter',sans-serif}.cm{font-family:'JetBrains Mono',monospace}
  .phone{width:344px;background:#0E0D11;border:0.5px solid #2a2935;border-radius:28px;overflow:hidden}
  .react{display:inline-flex;align-items:center;gap:5px;background:#1C1B22;border:0.5px solid #26252E;border-radius:999px;padding:4px 10px;font-size:13px;cursor:pointer}
  .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0E0D11;flex-shrink:0}
</style></head><body>
<div class="cap">ALPES · FOTOBUCH-KOMMENTARE + EMOJIS — MOCKUP</div>
<div class="phone">
  <img src="https://picsum.photos/seed/galibier/700/520" style="width:100%;height:210px;object-fit:cover;display:block" alt=""/>
  <div style="padding:14px 16px 16px">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px">
      <div class="avatar" style="background:#FF8A3D">M</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:500">Markus</div><div class="cm" style="font-size:11px;color:#8A8896">Gipfel Galibier · T1 · 11:20</div></div>
    </div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">
      <span class="react" style="border-color:rgba(255,138,61,.5)">❤️ <span class="cm" style="color:#F2F1F5">4</span></span>
      <span class="react">🔥 <span class="cm" style="color:#8A8896">2</span></span>
      <span class="react">😮 <span class="cm" style="color:#8A8896">1</span></span>
      <span class="react" style="color:#8A8896"><i class="ti ti-mood-plus" style="font-size:16px"></i></span>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:14px">
      <div style="display:flex;gap:9px"><div class="avatar" style="background:#6BD5E1">O</div><div style="flex:1"><span class="cb" style="font-size:13px"><b style="font-weight:500">Oma</b> <span style="color:#8A8896">· vor 1 Std</span></span><div class="cb" style="font-size:13px;margin-top:2px;line-height:1.45">Wahnsinn, passt auf euch auf da oben! 😍🙏</div></div></div>
      <div style="display:flex;gap:9px"><div class="avatar" style="background:#b07cc6">S</div><div style="flex:1"><span class="cb" style="font-size:13px"><b style="font-weight:500">Sandra</b> <span style="color:#8A8896">· vor 22 Min</span></span><div class="cb" style="font-size:13px;margin-top:2px;line-height:1.45">Der Schnee im Juli 😮 traumhaft</div></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:#16151B;border:0.5px solid #26252E;border-radius:999px">
      <div class="avatar" style="background:#7c9ec6;width:22px;height:22px;font-size:10px">D</div>
      <span class="cb" style="flex:1;font-size:13px;color:#55545e">Kommentar schreiben…</span>
      <i class="ti ti-mood-smile" style="font-size:19px;color:#8A8896"></i>
      <i class="ti ti-send" style="font-size:18px;color:#FF8A3D"></i>
    </div>
    <div style="font-size:11px;color:#55545e;margin-top:8px" class="cb">Kommentierst als <b style="color:#8A8896;font-weight:500">Du</b> · Name ändern</div>
  </div>
</div>
</body></html>
